# SwiftLint configuration for VoiceType
#
# Philosophy: warn on real foot-guns and token-discipline drift; do not
# enforce cosmetic style religion. Rules that clash with SwiftUI idioms
# are disabled. Custom rules exist to guard DESIGN.md tokens (Tokens.swift
# arrives in Tier A, Weekend 3-4).

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - Package.swift
  - Tests/VoiceTypeTests/Resources

# --- default rules we explicitly opt out of -------------------------------

disabled_rules:
  # SwiftUI view bodies routinely exceed these — enforcing is noise.
  - function_body_length
  - type_body_length
  # `i`, `x`, `y`, `id` are fine; opt-in identifier rules handle real cases.
  - identifier_name
  # `#if os(macOS)` conditional blocks trip this without benefit.
  - opening_brace
  # Wrap-style preferences better handled by swift-format, not lint.
  - trailing_whitespace
  # Until Tokens.swift lands, explicit `self.` in closures is clearer.
  - redundant_self

# --- opt-in rules worth turning on ---------------------------------------

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_string_enum_value
  - redundant_type_annotation
  - strict_fileprivate
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - vertical_whitespace_closing_braces
  - yoda_condition

# --- rule thresholds -----------------------------------------------------

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true

file_length:
  warning: 600
  error: 1200

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

nesting:
  type_level: 2

cyclomatic_complexity:
  warning: 15
  error: 25

force_unwrapping:
  severity: warning

implicitly_unwrapped_optional:
  severity: warning

# --- custom rules: DESIGN.md token discipline ----------------------------
#
# Tokens.swift is live as of 2026-04-24 (Tier A Step 1, commit fc93c77).
# Severity policy for the 3 color-literal rules:
#   - inline_color_hex:    ERROR  — zero current violations (Tokens.swift
#                                   is the sole legitimate consumer and
#                                   uses file-level swiftlint:disable).
#   - inline_nscolor_rgb:  ERROR  — zero current violations.
#   - inline_color_rgb:    WARNING (bump to ERROR in Tier A Step 2 after
#                                   WaveformView/VoiceTypeArtwork/WindowChrome
#                                   migrate to Palette tokens — currently
#                                   8 known violations across those 3 files).
# nsalert_runmodal + ultra_thin_material_on_capsule stay WARNING until Step 7
# (error-handling + capsule migration) replaces the current usages.

custom_rules:

  inline_color_rgb:
    name: "Inline Color RGB literal"
    regex: 'Color\(\s*(red|white):\s*[0-9\.]'
    message: >
      Use Palette tokens (Sources/VoiceType/Views/DesignSystem/Tokens.swift)
      instead of inline Color(red:green:blue:) or Color(white:) literals.
      See DESIGN.md § Color.
    severity: warning

  inline_color_hex:
    name: "Inline hex Color"
    regex: 'Color\(hex:'
    message: >
      Use Palette tokens from Tokens.swift instead of Color(hex:) literals.
      See DESIGN.md § Color.
    severity: error

  inline_nscolor_rgb:
    name: "Inline NSColor RGB literal"
    regex: 'NSColor\(\s*(red|calibratedRed|srgbRed|deviceRed):\s*[0-9\.]'
    message: >
      Use Palette.dynamic(...) or Palette tokens instead of inline NSColor
      RGB literals. See DESIGN.md § Color and D4 (NSColor(name:dynamicProvider:)
      pattern).
    severity: error

  ultra_thin_material_on_capsule:
    name: "ultraThinMaterial on recording capsule"
    regex: '\.ultraThinMaterial'
    included: "Sources/VoiceType/Views/Recording/.*\\.swift"
    message: >
      DESIGN.md bans .ultraThinMaterial on the recording capsule (no glassmorphism).
      Use Palette.surfaceRecording or equivalent token. See DESIGN.md § Aesthetic Direction.
    severity: warning

  nsalert_runmodal:
    name: "NSAlert.runModal for errors"
    regex: 'NSAlert\(\)[^{]*\.runModal\(\)|\.runModal\(\)'
    included: "Sources/VoiceType/.*\\.swift"
    message: >
      DESIGN.md routes errors through CapsuleState.errorInline / .errorToast
      (see D9/D10). NSAlert.runModal() is removed in Tier A step 7.
    severity: error

reporter: "xcode"
